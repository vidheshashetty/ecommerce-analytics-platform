name: dbt CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dbt
        run: pip install dbt-snowflake

      - name: Install dependencies
        run: |
          cd ecommerce_dbt
          dbt deps

      - name: Compile dbt models
        run: |
          cd ecommerce_dbt
          dbt compile --profiles-dir .
